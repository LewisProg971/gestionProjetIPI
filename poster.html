<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Posteur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="home-btn">🏠</a>
        <h1>📸 Posteur</h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>Ajouter un profil</h2>
            <form id="profileForm">
                <div class="form-group">
                    <label>Photos (Plusieurs possibles)</label>
                    <input type="file" id="imageFiles" accept="image/*" multiple required>
                    <div id="imagePreview" style="display:flex; gap:5px; margin-top:5px; flex-wrap:wrap;"></div>
                </div>
                <div class="form-group">
                    <label>Lieu</label>
                    <input type="text" id="location" placeholder="Paris, Lyon..." required>
                </div>
                <div class="form-group">
                    <label>Âge</label>
                    <input type="number" id="age" min="18" max="100" required>
                </div>
                <div class="form-group">
                    <label>Sexe</label>
                    <select id="gender" required>
                        <option value="Femme">Femme</option>
                        <option value="Homme">Homme</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Taille (cm)</label>
                    <input type="number" id="height" min="100" max="250" required>
                </div>
                <div class="form-group">
                    <label>Prix (Indicateur Beauté €)</label>
                    <input type="number" id="price" min="0" required>
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">Publier l'offre</button>
            </form>
        </div>

        <div id="matchesSection">
            <h2>Matchs en attente</h2>
            <div id="matchesList">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const form = document.getElementById('profileForm');
        const matchesList = document.getElementById('matchesList');
        const imageFiles = document.getElementById('imageFiles');
        const imagePreview = document.getElementById('imagePreview');
        let base64Images = [];

        imageFiles.addEventListener('change', async (e) => {
            imagePreview.innerHTML = '';
            base64Images = [];
            const files = Array.from(e.target.files);
            
            for (const file of files) {
                const base64 = await convertToBase64(file);
                base64Images.push(base64);
                const img = createHTMLElement('img', { 
                    src: base64, 
                    style: 'width:60px; height:60px; object-fit:cover; border-radius:5px' 
                });
                imagePreview.appendChild(img);
            }
        });

        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Validation
            if (base64Images.length === 0) {
                alert('Veuillez ajouter au moins une photo.');
                return;
            }

            const profile = {
                images: base64Images,
                location: document.getElementById('location').value,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                height: document.getElementById('height').value,
                price: parseFloat(document.getElementById('price').value)
            };
            
            Storage.addProfile(profile);
            form.reset();
            imagePreview.innerHTML = '';
            base64Images = [];
            alert('Profil ajouté avec succès !');
        });

        function renderMatches() {
            const profiles = Storage.getProfiles().filter(p => p.status === 'liked');
            matchesList.innerHTML = profiles.length === 0 ? '<p>Aucun match pour le moment.</p>' : '';
            
            profiles.forEach(profile => {
                const item = createHTMLElement('div', { className: 'card match-item' }, [
                    createHTMLElement('img', { src: profile.images[0] }),
                    createHTMLElement('div', { style: 'flex: 1' }, [
                        createHTMLElement('b', {}, [`${profile.gender}, ${profile.age} ans`]),
                        createHTMLElement('br'),
                        createHTMLElement('small', {}, [profile.location])
                    ]),
                    createHTMLElement('button', { 
                        className: 'btn-primary', 
                        onclick: () => acceptMatch(profile.id) 
                    }, ['Accepter'])
                ]);
                matchesList.appendChild(item);
            });
        }

        function acceptMatch(id) {
            const address = prompt("Saisissez l'adresse de rendez-vous pour ce match :");
            if (address) {
                Storage.addMeeting(id, address);
                renderMatches();
                alert('Match validé et adresse envoyée !');
            }
        }

        renderMatches();
        setInterval(renderMatches, 5000);
    </script>
</body>
</html>
