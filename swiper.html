<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Swiper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="home-btn">🏠</a>
        <img src="assets/logos/logo2.png" alt="Tin-Die Logo" class="logo">
    </header>

    <div class="container">
        <!-- Filters Bar -->
        <div class="filters-bar">
            <div class="filter-item">
                <label>Sexe</label>
                <select id="filterGender" onchange="loadProfiles()">
                    <option value="All">Tous</option>
                    <option value="Femme">Femmes</option>
                    <option value="Homme">Hommes</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Âge Min</label>
                <input type="number" id="filterAgeMin" value="18" min="18" onchange="loadProfiles()">
            </div>
            <div class="filter-item">
                <label>Âge Max</label>
                <input type="number" id="filterAgeMax" value="100" min="18" onchange="loadProfiles()">
            </div>
            <div class="filter-item">
                <label>Trier par Beauté</label>
                <select id="sortPrice" onchange="loadProfiles()">
                    <option value="none">Défaut</option>
                    <option value="desc">Prix Décroissant</option>
                    <option value="asc">Prix Croissant</option>
                </select>
            </div>
        </div>

        <div id="swiperContainer" class="swiper-wrapper">
            <!-- Dynamically populated card -->
            <div id="activeCard"></div>
        </div>
        
        <div class="swiper-actions">
            <button class="action-btn dislike" onclick="animateSwipe('dislike')">✖</button>
            <button class="action-btn like" onclick="animateSwipe('like')">❤</button>
        </div>

        <div id="confirmedMatches">
            <h3>Mes Matchs Confirmés</h3>
            <div id="confirmedList"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let currentProfiles = [];
        let currentIndex = 0;
        let currentImageIndex = 0;
        let knownConfirmedMatchesCount = 0;

        // Initialize Notifications
        Notifications.requestPermission();

        function loadProfiles() {
            const gender = document.getElementById('filterGender').value;
            const ageMin = parseInt(document.getElementById('filterAgeMin').value);
            const ageMax = parseInt(document.getElementById('filterAgeMax').value);
            const sort = document.getElementById('sortPrice').value;

            let profiles = Storage.getProfiles().filter(p => 
                p.status === 'available' &&
                (gender === 'All' || p.gender === gender) &&
                p.age >= ageMin &&
                p.age <= ageMax
            );

            if (sort === 'asc') profiles.sort((a, b) => a.price - b.price);
            if (sort === 'desc') profiles.sort((a, b) => b.price - a.price);

            currentProfiles = profiles;
            currentIndex = 0;
            renderActiveCard();
        }

        function renderActiveCard() {
            const cardContainer = document.getElementById('activeCard');
            const actions = document.querySelector('.swiper-actions');
            
            if (currentProfiles.length === 0 || currentIndex >= currentProfiles.length) {
                cardContainer.innerHTML = `
                    <div class="card" style="text-align: center; padding: 3rem; width:100%">
                        <p>Aucun profil ne correspond à vos critères !</p>
                        <small>Modifiez vos filtres ou revenez plus tard.</small>
                    </div>
                `;
                actions.style.display = 'none';
                return;
            }

            actions.style.display = 'flex';
            const profile = currentProfiles[currentIndex];
            currentImageIndex = 0;
            
            cardContainer.innerHTML = `
                <div class="swiper-card" id="currentCard" onclick="handleImageClick(event)">
                    <div class="gallery-dots" id="galleryDots"></div>
                    <img id="cardImg" src="${profile.images[0]}">
                    <div class="swiper-info">
                        <h2>${profile.gender}, ${profile.age}</h2>
                        <p>📍 ${profile.location} | 📏 ${profile.height}cm</p>
                        <p>💎 Beauté : ${profile.price} €</p>
                    </div>
                </div>
            `;
            updateGalleryDots();
        }

        function handleImageClick(e) {
            const profile = currentProfiles[currentIndex];
            if (!profile || profile.images.length <= 1) return;

            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;

            if (x < rect.width / 2) {
                // Click left
                currentImageIndex = (currentImageIndex - 1 + profile.images.length) % profile.images.length;
            } else {
                // Click right
                currentImageIndex = (currentImageIndex + 1) % profile.images.length;
            }

            document.getElementById('cardImg').src = profile.images[currentImageIndex];
            updateGalleryDots();
        }

        function updateGalleryDots() {
            const profile = currentProfiles[currentIndex];
            const dotsContainer = document.getElementById('galleryDots');
            dotsContainer.innerHTML = '';
            
            profile.images.forEach((_, index) => {
                const dot = createHTMLElement('div', { 
                    className: `dot ${index === currentImageIndex ? 'active' : ''}` 
                });
                dotsContainer.appendChild(dot);
            });
        }

        function animateSwipe(action) {
            const card = document.getElementById('currentCard');
            if (!card) return;

            card.classList.add(action === 'like' ? 'swipe-right' : 'swipe-left');

            setTimeout(() => {
                handleSwipe(action);
            }, 500);
        }

        function handleSwipe(action) {
            const profile = currentProfiles[currentIndex];
            if (!profile) return;

            if (action === 'like') {
                Storage.updateProfileStatus(profile.id, 'liked');
            }
            
            currentIndex++;
            renderActiveCard();
        }

        function renderConfirmedMatches() {
            const profiles = Storage.getProfiles().filter(p => p.status === 'matched');
            const meetings = Storage.getMeetings();
            const list = document.getElementById('confirmedList');
            
            // Notification check
            if (profiles.length > knownConfirmedMatchesCount) {
                Notifications.send("Nouveau Match !", "Un posteur a accepté votre match et donné une adresse !");
                knownConfirmedMatchesCount = profiles.length;
            }

            list.innerHTML = profiles.length === 0 ? '<p>Aucun match confirmé.</p>' : '';
            
            profiles.forEach(profile => {
                const meeting = meetings.find(m => m.profileId === profile.id);
                const item = createHTMLElement('div', { className: 'card' }, [
                    createHTMLElement('div', { className: 'match-item', style: 'border:none' }, [
                        createHTMLElement('img', { src: profile.images[0] }),
                        createHTMLElement('div', {}, [
                            createHTMLElement('b', {}, [`Match avec ${profile.gender}`]),
                            createHTMLElement('div', { className: 'meeting-info' }, [
                                createHTMLElement('strong', {}, ['📍 Adresse de RDV : ']),
                                createHTMLElement('span', {}, [meeting ? meeting.address : 'En attente...'])
                            ])
                        ])
                    ])
                ]);
                list.appendChild(item);
            });
        }

        loadProfiles();
        renderConfirmedMatches();
        setInterval(renderConfirmedMatches, 5000);
    </script>
</body>
</html>
